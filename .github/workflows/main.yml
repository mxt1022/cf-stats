name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  svg-generation:
    runs-on: ubuntu-22.04

    steps:
      # Check out repository
      - uses: actions/checkout@v2

      # Set up Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
          architecture: 'x64'

      # Cache pip dependencies (will be rebuilt if requirements.txt changes)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies with a fixed setuptools version
      - name: Install requirements
        run: |
          python3 -m pip install --upgrade pip
          # Remove any existing setuptools to avoid conflicts
          python3 -m pip uninstall -y setuptools || true
          # Install setuptools 58.0.0 (known to work with pkg_resources in pybadges)
          python3 -m pip install setuptools==58.0.0 wheel
          # Install project dependencies
          python3 -m pip install -r requirements.txt
          # Optionally upgrade pybadges to the latest version
          python3 -m pip install --upgrade pybadges
          # Install the current project in editable mode
          python3 -m pip install -e .
          # Verify pkg_resources is available
          python3 -c "import pkg_resources; print('pkg_resources is available')"

      # Create environment file (if needed)
      - name: create env file
        run: |
          touch config/.env
          cat config/.env.template > config/.env

      # Generate all statistics images
      - name: Generate images
        run: |
          python3 --version
          python3 app/main.py

      # Commit all changed files to the repository
      - name: Commit to the repo
        run: |
          git config --global user.name "sudiptob2/cf-stats"
          git config --global user.email "cf-stats[bot]@sudiptob2.github.io"
          git add .
          # Force the build to succeed, even if no files were changed
          git commit -m 'Update generated files' || true
          git push
