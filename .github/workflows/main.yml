name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  svg-generation:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-v3
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install requirements
        run: |
          python3 -m pip install --upgrade pip
          # Uninstall any existing setuptools and install a known working version
          python3 -m pip uninstall -y setuptools
          python3 -m pip install setuptools==58.0.0
          python3 -m pip install wheel
          # Install dependencies from requirements.txt
          python3 -m pip install -r requirements.txt
          # Install the package in editable mode
          python3 -m pip install -e .
          # Double-check pkg_resources is available
          python3 -c "import pkg_resources; print('pkg_resources OK')"

      - name: Create env file
        run: |
          touch config/.env
          cat config/.env.template > config/.env

      - name: Generate images
        run: |
          python3 --version
          python3 app/main.py

      - name: Commit to the repo
        run: |
          git config --global user.name "sudiptob2/cf-stats"
          git config --global user.email "cf-stats[bot]@sudiptob2.github.io"
          git add .
          git commit -m 'Update generated files' || true
          git push
